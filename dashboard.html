<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Lab-13 Observability Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f1117; color: #e2e8f0; font-family: system-ui, sans-serif; padding: 20px; }
    h1 { font-size: 1.2rem; color: #94a3b8; margin-bottom: 16px; letter-spacing: 0.05em; }
    #status { font-size: 0.75rem; color: #64748b; margin-bottom: 20px; }
    #status.ok { color: #22c55e; }
    #status.err { color: #ef4444; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .panel {
      background: #1e2130; border: 1px solid #2d3148;
      border-radius: 8px; padding: 16px;
    }
    .panel h2 { font-size: 0.75rem; color: #64748b; text-transform: uppercase;
                letter-spacing: 0.08em; margin-bottom: 12px; }
    .stat-row { display: flex; gap: 16px; margin-bottom: 12px; flex-wrap: wrap; }
    .stat { text-align: center; }
    .stat .val { font-size: 1.6rem; font-weight: 700; color: #e2e8f0; line-height: 1; }
    .stat .lbl { font-size: 0.65rem; color: #64748b; margin-top: 2px; }
    .stat.warn .val { color: #f59e0b; }
    .stat.crit .val { color: #ef4444; }
    canvas { max-height: 160px; }
    .error-list { font-size: 0.8rem; color: #f87171; line-height: 1.8; }
    .no-errors { font-size: 0.8rem; color: #22c55e; }
  </style>
</head>
<body>
  <h1>LAB-13 · OBSERVABILITY DASHBOARD</h1>
  <div id="status">Connecting to localhost:8001…</div>

  <div class="grid">
    <!-- Panel 1: Latency -->
    <div class="panel">
      <h2>Latency (ms)</h2>
      <div class="stat-row" id="latency-stats"></div>
      <canvas id="latency-chart"></canvas>
    </div>

    <!-- Panel 2: Traffic -->
    <div class="panel">
      <h2>Traffic</h2>
      <div class="stat-row" id="traffic-stats"></div>
      <canvas id="traffic-chart"></canvas>
    </div>

    <!-- Panel 3: Error Rate -->
    <div class="panel">
      <h2>Errors</h2>
      <div id="error-display"></div>
      <canvas id="error-chart"></canvas>
    </div>

    <!-- Panel 4: Cost -->
    <div class="panel">
      <h2>Cost (USD)</h2>
      <div class="stat-row" id="cost-stats"></div>
      <canvas id="cost-chart"></canvas>
    </div>

    <!-- Panel 5: Tokens -->
    <div class="panel">
      <h2>Tokens</h2>
      <div class="stat-row" id="token-stats"></div>
      <canvas id="token-chart"></canvas>
    </div>

    <!-- Panel 6: Quality -->
    <div class="panel">
      <h2>Quality Score</h2>
      <div class="stat-row" id="quality-stats"></div>
      <canvas id="quality-chart"></canvas>
    </div>
  </div>

<script>
const API = 'http://localhost:8001/metrics';
const MAX_POINTS = 30;
const labels = [];

const history = {
  latency_p50: [], latency_p95: [], latency_p99: [],
  traffic: [],
  error_total: [],
  avg_cost: [], total_cost: [],
  tokens_in: [], tokens_out: [],
  quality: [],
};

function mkChart(id, datasets, yLabel = '') {
  return new Chart(document.getElementById(id), {
    type: 'line',
    data: { labels, datasets },
    options: {
      animation: false,
      responsive: true,
      plugins: { legend: { labels: { color: '#94a3b8', font: { size: 10 } } } },
      scales: {
        x: { ticks: { color: '#4b5563', maxTicksLimit: 6, font: { size: 9 } },
             grid: { color: '#1e2130' } },
        y: { ticks: { color: '#4b5563', font: { size: 9 } },
             grid: { color: '#2d3148' },
             title: { display: !!yLabel, text: yLabel, color: '#4b5563', font: { size: 9 } } }
      }
    }
  });
}

const latencyChart = mkChart('latency-chart', [
  { label: 'P50', data: history.latency_p50, borderColor: '#22c55e', tension: 0.3, pointRadius: 2 },
  { label: 'P95', data: history.latency_p95, borderColor: '#f59e0b', tension: 0.3, pointRadius: 2 },
  { label: 'P99', data: history.latency_p99, borderColor: '#ef4444', tension: 0.3, pointRadius: 2 },
]);

const trafficChart = mkChart('traffic-chart', [
  { label: 'Requests', data: history.traffic, borderColor: '#818cf8', tension: 0.3, pointRadius: 2 },
]);

const errorChart = mkChart('error-chart', [
  { label: 'Errors', data: history.error_total, borderColor: '#ef4444',
    backgroundColor: 'rgba(239,68,68,0.15)', fill: true, tension: 0.3, pointRadius: 2 },
]);

const costChart = mkChart('cost-chart', [
  { label: 'Avg/req', data: history.avg_cost, borderColor: '#a78bfa', tension: 0.3, pointRadius: 2 },
  { label: 'Total', data: history.total_cost, borderColor: '#7c3aed', tension: 0.3, pointRadius: 2 },
]);

const tokenChart = mkChart('token-chart', [
  { label: 'In',  data: history.tokens_in,  borderColor: '#38bdf8', tension: 0.3, pointRadius: 2 },
  { label: 'Out', data: history.tokens_out, borderColor: '#0ea5e9', tension: 0.3, pointRadius: 2 },
]);

const qualityChart = mkChart('quality-chart', [
  { label: 'Quality', data: history.quality, borderColor: '#34d399',
    backgroundColor: 'rgba(52,211,153,0.1)', fill: true, tension: 0.3, pointRadius: 2 },
]);

function stat(val, lbl, cls = '') {
  return `<div class="stat ${cls}"><div class="val">${val}</div><div class="lbl">${lbl}</div></div>`;
}

function push(arr, val) {
  arr.push(val);
  if (arr.length > MAX_POINTS) arr.shift();
}

async function tick() {
  try {
    const r = await fetch(API);
    if (!r.ok) throw new Error(r.status);
    const d = await r.json();

    const now = new Date().toLocaleTimeString();
    labels.push(now);
    if (labels.length > MAX_POINTS) labels.shift();

    // history
    push(history.latency_p50, d.latency_p50 ?? 0);
    push(history.latency_p95, d.latency_p95 ?? 0);
    push(history.latency_p99, d.latency_p99 ?? 0);
    push(history.traffic, d.traffic ?? 0);
    const errTotal = Object.values(d.error_breakdown ?? {}).reduce((a, b) => a + b, 0);
    push(history.error_total, errTotal);
    push(history.avg_cost, +(d.avg_cost_usd ?? 0).toFixed(5));
    push(history.total_cost, +(d.total_cost_usd ?? 0).toFixed(4));
    push(history.tokens_in, d.tokens_in_total ?? 0);
    push(history.tokens_out, d.tokens_out_total ?? 0);
    push(history.quality, +(d.quality_avg ?? 0).toFixed(3));

    // stats
    const p95cls = d.latency_p95 > 5000 ? 'crit' : d.latency_p95 > 3000 ? 'warn' : '';
    document.getElementById('latency-stats').innerHTML =
      stat(d.latency_p50 ?? '–', 'P50') +
      stat(d.latency_p95 ?? '–', 'P95', p95cls) +
      stat(d.latency_p99 ?? '–', 'P99');

    document.getElementById('traffic-stats').innerHTML =
      stat(d.traffic ?? 0, 'Total requests');

    const errHtml = errTotal === 0
      ? '<div class="no-errors">✓ No errors</div>'
      : '<div class="error-list">' +
        Object.entries(d.error_breakdown).map(([k,v]) => `${k}: <b>${v}</b>`).join('<br>') +
        '</div>';
    document.getElementById('error-display').innerHTML = errHtml;

    const costCls = d.avg_cost_usd > 0.004 ? 'crit' : d.avg_cost_usd > 0.003 ? 'warn' : '';
    document.getElementById('cost-stats').innerHTML =
      stat('$' + (d.avg_cost_usd ?? 0).toFixed(5), 'Avg/req', costCls) +
      stat('$' + (d.total_cost_usd ?? 0).toFixed(4), 'Total');

    document.getElementById('token-stats').innerHTML =
      stat(d.tokens_in_total ?? 0, 'In') +
      stat(d.tokens_out_total ?? 0, 'Out');

    const qCls = d.quality_avg < 0.75 ? 'warn' : '';
    document.getElementById('quality-stats').innerHTML =
      stat((d.quality_avg ?? 0).toFixed(3), 'Avg score', qCls);

    // redraw
    [latencyChart, trafficChart, errorChart, costChart, tokenChart, qualityChart]
      .forEach(c => c.update());

    const s = document.getElementById('status');
    s.textContent = `Last updated: ${now} · traffic=${d.traffic} · errors=${errTotal}`;
    s.className = errTotal > 0 ? 'err' : 'ok';

  } catch (e) {
    const s = document.getElementById('status');
    s.textContent = `Cannot reach ${API} — is the server running? (${e})`;
    s.className = 'err';
  }
}

tick();
setInterval(tick, 3000);
</script>
</body>
</html>
